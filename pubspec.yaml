  fluttertoast: ^8.2.12
  dio: ^5.8.0+1
  rxdart: ^0.28.0
  get: ^4.7.2
  connectivity_plus: ^6.1.3
  cached_network_image: ^3.4.1
  image_picker: ^1.2.0
  dotted_border: ^2.1.0
  emoji_picker_flutter: ^4.3.0
